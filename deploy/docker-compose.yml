#
# Caddy + App full-stack deployment (production) using Docker Compose.
#
# Changes made:
# - Added Caddy (TLS/HTTPS) reverse proxy container
# - Added MySQL with persisted volume
# - Wired backend to MySQL via env-var override for datasource URL
# - Wired frontend behind Caddy
# - Added Portainer UI proxied by Caddy
# - Aligned frontend image tag to 2.0.0 to match package.json
# - Configure MySQL app user; backend uses non-root DB credentials
#
# @LLM_USAGE Fully LLM generated.
# @LLM_USAGE Compose refined by LLM: base/override model; removed version key.
# @LLM_USAGE Frontend image tag aligned to 2.0.0 to match package.json.
# @LLM_USAGE MySQL app user added and backend wired to use it.



services:
  caddy:
    image: caddy:2
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
      - backend
      - portainer
      - wordpress

  mysql:
    image: mysql:8.0
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: jocks-karaoke
      MYSQL_USER: ${MYSQL_APP_USER}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    expose:
      - "3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: aldoink/jocks-karaoke:backend_1.0.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/jocks-karaoke
      SPRING_DATASOURCE_USERNAME: ${MYSQL_APP_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_APP_PASSWORD}
    expose:
      - "9090"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    image: aldoink/jocks-karaoke:frontend_2.0.0
    restart: always
    expose:
      - "3000"
    depends_on:
      - backend

  portainer:
    image: portainer/portainer-ce:2.11.1
    restart: always
    expose:
      - "9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data

  wordpress-db:
    image: mysql:8.0
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${WORDPRESS_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${WORDPRESS_DB_NAME}
      MYSQL_USER: ${WORDPRESS_DB_USER}
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD}
    volumes:
      - wordpress-db-data:/var/lib/mysql
    expose:
      - "3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  wordpress:
    image: wordpress:latest
    restart: always
    environment:
      WORDPRESS_DB_HOST: wordpress-db:3306
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
    volumes:
      - wordpress-data:/var/www/html
    expose:
      - "80"
    depends_on:
      wordpress-db:
        condition: service_healthy

volumes:
  caddy-data:
  caddy-config:
  mysql-data:
  portainer-data:
  wordpress-db-data:
  wordpress-data:


